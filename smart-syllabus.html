<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart NEET Syllabus PRO</title>

<style>
:root{
    --bg:#0f172a;
    --text:white;
    --card:rgba(255,255,255,0.05);
}
.light{
    --bg:#f1f5ff;
    --text:#111;
}
body{
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:1rem 2rem;
}

/* HERO */
.hero{
    text-align:center;
    padding:2rem;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    padding:2rem;
}

/* CARD */
.card{
    background:var(--card);
    padding:1.5rem;
    border-radius:15px;
    margin-bottom:2rem;
}

/* CHECKBOX */
label{
    display:block;
    margin:8px 0;
    cursor:pointer;
}

/* PROGRESS BAR */
.progress{
    height:20px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}
.bar{
    height:100%;
    background:#22c55e;
    width:0%;
}

/* TIMER */
.timer{
    text-align:center;
    font-size:2rem;
    margin:1rem 0;
}
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* TAGS */
.high{color:#22c55e;}
.medium{color:#facc15;}
.low{color:#ef4444;}
</style>
</head>

<body>

<nav>
<b>🧠 Smart Syllabus PRO</b>
<span onclick="toggleMode()" id="icon">🌕</span>
</nav>

<section class="hero">
<h1>NEET Smart Syllabus + Tracker</h1>
<p>Track progress + Focus on high yield topics</p>
</section>

<div class="container">

<!-- TIMER -->
<div class="card">
<h2>⏱ Study Timer</h2>
<div class="timer" id="time">00:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>

<!-- PROGRESS -->
<div class="card">
<h2>📊 Progress Tracker</h2>
<div class="progress">
<div class="bar" id="bar"></div>
</div>
<p id="percent">0% Completed</p>
</div>

<!-- BIO -->
<div class="card">
<h2>🌿 Biology</h2>

<label><input type="checkbox" class="chk"> Human Physiology <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> Genetics <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> Ecology <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> Plant Physiology <span class="medium">⭐⭐⭐</span></label>

</div>

<!-- CHEM -->
<div class="card">
<h2>⚗️ Chemistry</h2>

<label><input type="checkbox" class="chk"> Mole Concept <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> Thermodynamics <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> GOC <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> Chemical Bonding <span class="high">⭐⭐⭐⭐</span></label>

</div>

<!-- PHYSICS -->
<div class="card">
<h2>⚡ Physics</h2>

<label><input type="checkbox" class="chk"> Laws of Motion <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> Current Electricity <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> Thermodynamics <span class="high">⭐⭐⭐⭐</span></label>
<label><input type="checkbox" class="chk"> Magnetism <span class="high">⭐⭐⭐⭐</span></label>

</div>

</div>

<script>
/* DARK MODE */
function toggleMode(){
    document.body.classList.toggle("light");
    let icon=document.getElementById("icon");

    if(document.body.classList.contains("light")){
        icon.textContent="🌞";
        localStorage.setItem("mode","light");
    } else {
        icon.textContent="🌕";
        localStorage.setItem("mode","dark");
    }
}
if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
}

/* PROGRESS */
let checkboxes=document.querySelectorAll(".chk");

checkboxes.forEach((box,i)=>{
    box.checked=localStorage.getItem("chk"+i)==="true";

    box.addEventListener("change",()=>{
        localStorage.setItem("chk"+i,box.checked);
        updateProgress();
    });
});

function updateProgress(){
    let total=checkboxes.length;
    let done=0;

    checkboxes.forEach(b=>{if(b.checked) done++;});

    let percent=(done/total)*100;
    document.getElementById("bar").style.width=percent+"%";
    document.getElementById("percent").innerText=Math.round(percent)+"% Completed";
}

updateProgress();

/* TIMER */
let seconds=0;
let timer;

function startTimer(){
    timer=setInterval(()=>{
        seconds++;
        let m=Math.floor(seconds/60);
        let s=seconds%60;
        document.getElementById("time").innerText=
        (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
    },1000);
}

function pauseTimer(){
    clearInterval(timer);
}

function resetTimer(){
    clearInterval(timer);
    seconds=0;
    document.getElementById("time").innerText="00:00";
}
</script>

</body>
    </html>
